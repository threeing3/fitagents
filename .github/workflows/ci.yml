name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install ruff==0.11.0

      - name: Ruff check
        run: ruff check fast_api/ tests/
        continue-on-error: true

      - name: Ruff format (dry-run)
        run: ruff format --check fast_api/ tests/
        continue-on-error: true

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r fast_api/requirements.txt
          pip install mypy==1.15.0

      - name: Mypy
        run: mypy fast_api/ --ignore-missing-imports --no-error-summary
        continue-on-error: true

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      DATABASE_URL: sqlite:///:memory:
      USE_PGVECTOR: "false"
      LLM_PROVIDER: offline
      EMBEDDING_PROVIDER: offline
      JWT_SECRET_KEY: ci-test-secret-key-for-automated-tests
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 60
      CORS_ORIGINS: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('fast_api/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          pip install -r fast_api/requirements.txt

      - name: Run tests
        run: |
          cd fast_api
          python -m pytest ../tests/ -v --tb=short --timeout=30

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          tags: ai-fitness-coach:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  validate-openapi:
    name: Validate OpenAPI Schema
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r fast_api/requirements.txt

      - name: Export OpenAPI schema
        run: |
          cd fast_api
          python -c "
          from fast_api.app.main import app
          import json
          schema = app.openapi()
          with open('/tmp/openapi.json', 'w') as f:
              json.dump(schema, f)
          print(f'OpenAPI schema has {len(schema.get(\"paths\", {}))} paths')
          "
        env:
          DATABASE_URL: sqlite:///:memory:
          USE_PGVECTOR: "false"
          LLM_PROVIDER: offline
          EMBEDDING_PROVIDER: offline
          JWT_SECRET_KEY: validate-secret

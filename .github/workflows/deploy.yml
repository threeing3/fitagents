name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target'
        required: true
        type: choice
        default: 'staging'
        options:
          - staging
          - production
      image_tag:
        description: 'Docker image tag (default: git sha)'
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - 'fast_api/**'
      - 'frontend/**'
      - 'Dockerfile'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ----------------------------------------------------------
  # Gate — all CI checks must pass before deploy proceeds
  # ----------------------------------------------------------
  ci-gate:
    name: CI Gate
    uses: ./.github/workflows/ci.yml
    # Only gate on push-to-main; workflow_dispatch skips the gate
    if: github.event_name == 'push'

  # ----------------------------------------------------------
  # Build & push Docker image
  # ----------------------------------------------------------
  docker:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [ci-gate]
    if: |
      always() &&
      (needs.ci-gate.result == 'success' || needs.ci-gate.result == 'skipped')
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ai-fitness-coach
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------------------------
  # Deploy to staging
  # ----------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker]
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment: staging
    steps:
      - name: Deploy placeholder
        run: |
          echo "STAGING DEPLOY — image: ghcr.io/${{ github.repository_owner }}/ai-fitness-coach:${{ needs.docker.outputs.image_tag }}"
          echo "🚧 Add your deployment step here (SSH / kubectl / ECS / Fly / Render)."
          echo "Examples:"
          echo "  - SSH:     rsync -avz --delete ./dist/ user@staging-host:/app/"
          echo "  - K8s:     kubectl set image deploy/coach coach=ghcr.io/...:$TAG -n staging"
          echo "  - ECS:     aws ecs update-service --cluster staging --service coach --force-new-deployment"
          echo "  - Fly.io:  flyctl deploy -a ai-fitness-coach-staging"
          echo "  - Render:  curl -X POST \$RENDER_DEPLOY_HOOK_STAGING"

  # ----------------------------------------------------------
  # Deploy to production (manual trigger only)
  # ----------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment: production
    steps:
      - name: Deploy placeholder
        run: |
          echo "PRODUCTION DEPLOY — image: ghcr.io/${{ github.repository_owner }}/ai-fitness-coach:${{ needs.docker.outputs.image_tag }}"
          echo "🚧 Add your production deployment step here."
          echo "Production deploys are manual-only (workflow_dispatch with environment=production)."
